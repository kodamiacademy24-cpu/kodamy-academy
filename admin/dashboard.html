<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KodamiAdmin — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/styles.css">
<style>
.admin-actions { display:flex; gap:6px; }
.admin-btn-sm { padding:4px 10px; font-size:.7rem; border-radius:6px; border:1px solid transparent; cursor:pointer; font-family:inherit; transition:.2s; }
.btn-edit { background:rgba(100,200,255,.15); color:#64c8ff; border-color:rgba(100,200,255,.3); }
.btn-edit:hover { background:rgba(100,200,255,.3); }
.btn-del { background:rgba(255,80,80,.15); color:#ff5050; border-color:rgba(255,80,80,.3); }
.btn-del:hover { background:rgba(255,80,80,.3); }
.badge { display:inline-block; font-size:.6rem; padding:2px 8px; border-radius:10px; text-transform:uppercase; letter-spacing:.5px; }
.badge-active { background:rgba(80,255,120,.15); color:#50ff78; }
.badge-inactive { background:rgba(255,80,80,.15); color:#ff5050; }
.modal-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,.7); display:flex; align-items:center; justify-content:center; z-index:999; }
.modal-card { background:var(--bg-card); border:1px solid var(--border); border-radius:16px; padding:24px; width:90%; max-width:480px; }
.modal-card h3 { margin:0 0 16px; color:var(--gold); font-family:var(--font-deco); }
.modal-card label { display:block; font-size:.75rem; color:var(--ash); margin:8px 0 4px; }
.modal-card input,.modal-card select,.modal-card textarea { width:100%; padding:8px 12px; border-radius:8px; border:1px solid var(--border); background:var(--bg-body); color:var(--text); font-family:inherit; font-size:.85rem; box-sizing:border-box; }
.modal-card textarea { min-height:60px; resize:vertical; }
.modal-actions { display:flex; gap:8px; justify-content:flex-end; margin-top:16px; }
</style>
</head>
<body class="admin-body">
<div class="admin-container">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
    <div class="nav-logo">Kodami<span>Admin</span></div>
    <button class="admin-btn" onclick="logout()" style="background:rgba(255,80,80,.2);color:#ff5050;">Cerrar Sesión</button>
  </div>
  <div class="admin-stats" id="statsContainer">
    <div class="admin-stat-card"><div class="admin-stat-num" id="statRecursos">-</div><div class="admin-stat-label">Recursos</div></div>
    <div class="admin-stat-card"><div class="admin-stat-num" id="statVisitas">-</div><div class="admin-stat-label">Visitas totales</div></div>
    <div class="admin-stat-card"><div class="admin-stat-num" id="statDocente">👤</div><div class="admin-stat-label" id="statDocenteNombre">Docente</div></div>
  </div>
  <div class="admin-card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <div class="admin-title" style="margin:0;">Mis Recursos</div>
      <a href="upload.html" class="admin-btn">+ Subir Nuevo</a>
    </div>
    <table class="admin-table">
      <thead><tr><th>Título</th><th>Tipo</th><th>Tema</th><th>Estado</th><th>Visitas</th><th>Fecha</th><th></th></tr></thead>
      <tbody id="recursosTableBody">
        <tr><td colspan="7" style="text-align:center;color:var(--ash);padding:20px;">Cargando recursos...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<div id="editModal" class="modal-overlay" style="display:none" onclick="if(event.target===this)cerrarEdit()">
  <div class="modal-card" onclick="event.stopPropagation()">
    <h3>✏️ Editar Recurso</h3>
    <label>Título</label>
    <input id="editTitulo" type="text">
    <label>Descripción</label>
    <textarea id="editDescripcion"></textarea>
    <label>Tipo</label>
    <select id="editTipo">
      <option value="libro">Libro</option>
      <option value="video">Video</option>
      <option value="audio">Audio</option>
      <option value="juego">Juego</option>
      <option value="imagen">Imagen</option>
      <option value="documento">Documento</option>
    </select>
    <label>Tema</label>
    <input id="editTema" type="text">
    <label>Nivel (1-5)</label>
    <input id="editNivel" type="number" min="1" max="5">
    <div class="modal-actions">
      <button class="admin-btn" onclick="cerrarEdit()" style="background:rgba(255,255,255,.1);color:var(--ash);">Cancelar</button>
      <button class="admin-btn" id="btnGuardarEdit">Guardar</button>
    </div>
  </div>
</div>

<script>
const API = 'https://kodami-api.kodami-academy24.workers.dev';
const user = JSON.parse(localStorage.getItem('kodami_user') || '{}');
const token = localStorage.getItem('kodami_token');
if (!token) window.location.href = 'login.html';

document.getElementById('statDocenteNombre').textContent = user.nombre || 'Docente';

let editId = null;

async function loadDashboard() {
  try {
    const res = await fetch(`${API}/api/recursos/admin`, { headers: { 'Authorization': `Bearer ${token}` } });
    const json = await res.json();
    if (!json.success) return;
    const data = json.data;
    document.getElementById('statRecursos').textContent = data.length;
    let totalVisitas = 0;
    document.getElementById('recursosTableBody').innerHTML = data.map(r => {
      totalVisitas += r.visitas || 0;
      const badge = r.activo ? '<span class="badge badge-active">Activo</span>' : '<span class="badge badge-inactive">Inactivo</span>';
      return '<tr>' +
        `<td>${r.titulo}</td>` +
        `<td style="color:var(--craft);text-transform:uppercase;font-size:.75rem;">${r.tipo}</td>` +
        `<td style="color:var(--ash);font-size:.75rem;">${r.tema || '-'}</td>` +
        `<td>${badge}</td>` +
        `<td>${r.visitas || 0}</td>` +
        `<td style="color:var(--ash);font-size:.7rem;">${r.created_at ? new Date(r.created_at).toLocaleDateString() : '-'}</td>` +
        '<td><div class="admin-actions">' +
          `<button class="admin-btn-sm btn-edit" onclick="editar(${r.id},'${r.titulo.replace(/'/g,"\\'")}','${(r.descripcion||'').replace(/'/g,"\\'")}','${r.tipo||''}','${(r.tema||'').replace(/'/g,"\\'")}',${r.nivel||1})">✏️</button>` +
          (r.activo ? `<button class="admin-btn-sm btn-del" onclick="eliminar(${r.id})">🗑️</button>` : '') +
        '</div></td>' +
      '</tr>';
    }).join('');
    document.getElementById('statVisitas').textContent = totalVisitas;
  } catch {}
}

function editar(id, titulo, descripcion, tipo, tema, nivel) {
  editId = id;
  document.getElementById('editTitulo').value = titulo;
  document.getElementById('editDescripcion').value = descripcion;
  document.getElementById('editTipo').value = tipo;
  document.getElementById('editTema').value = tema;
  document.getElementById('editNivel').value = nivel;
  document.getElementById('editModal').style.display = 'flex';
}

function cerrarEdit() {
  document.getElementById('editModal').style.display = 'none';
  editId = null;
}

document.getElementById('btnGuardarEdit').onclick = async () => {
  if (!editId) return;
  const body = {
    titulo: document.getElementById('editTitulo').value.trim(),
    descripcion: document.getElementById('editDescripcion').value.trim(),
    tipo: document.getElementById('editTipo').value,
    tema: document.getElementById('editTema').value.trim(),
    nivel: parseInt(document.getElementById('editNivel').value) || 1
  };
  if (!body.titulo) return alert('El título es obligatorio');
  try {
    const res = await fetch(`${API}/api/recursos/${editId}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }
    });
    const json = await res.json();
    if (json.success) { cerrarEdit(); loadDashboard(); }
    else alert(json.error || 'Error al guardar');
  } catch { alert('Error de conexión'); }
};

function eliminar(id) {
  if (!confirm('¿Dar de baja este recurso? Se ocultará del público pero no se borrará el archivo.')) return;
  (async () => {
    try {
      const res = await fetch(`${API}/api/recursos/${id}`, {
        method: 'DELETE',
        headers: { 'Authorization': `Bearer ${token}` }
      });
      const json = await res.json();
      if (json.success) loadDashboard();
      else alert(json.error || 'Error al eliminar');
    } catch { alert('Error de conexión'); }
  })();
}

function logout() { localStorage.removeItem('kodami_token'); localStorage.removeItem('kodami_user'); window.location.href = 'login.html'; }

loadDashboard();
</script>
</body>
</html>
